<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathwarden</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Pathwarden</h1>

      <div class="button-group">
        <button id="startupBtn">Run Startup</button>
        <button id="diagnosticsBtn">Run Diagnostics</button>
        <button id="diagnosticsLatestBtn">View Diagnostics</button>
        <button id="tasksBtn">View Tasks</button>
        <button id="auditBtn">View Audit</button>
      </div>

      <section class="meta-panel">
        <h3>Status</h3>
        <p id="statusText">Desktop shell loaded.</p>
      </section>

      <section class="meta-panel">
        <h3>Bridge</h3>
        <p id="bridgeText">Checking...</p>
      </section>
    </aside>

    <main class="content">
      <section class="panel">
        <div class="panel-header">
          <h2 id="viewTitle">Output</h2>
          <button id="clearBtn" class="secondary">Clear</button>
        </div>

        <div class="top-grid">
          <section class="subpanel">
            <h3>Create Task from Natural Language</h3>
            <textarea id="taskInput" rows="4" placeholder="Example: run diagnostics tonight"></textarea>
            <button id="createTaskDraftBtn">Create Task Draft</button>
          </section>

          <section class="subpanel">
            <h3>Default Tasks</h3>
            <button id="loadDefaultTasksBtn">Load Default Tasks</button>
            <div id="defaultTasksContainer" class="list-container"></div>
          </section>
        </div>

        <section class="subpanel">
          <h3>Settings: Folder and Application Access</h3>
          <div class="settings-actions">
            <button id="loadSettingsBtn">Load Device Access Options</button>
            <button id="saveSettingsBtn">Save Access Policy</button>
          </div>

          <div class="settings-grid">
            <div>
              <h4>Folders on This Device</h4>
              <div id="foldersContainer" class="list-container"></div>
            </div>
            <div>
              <h4>Applications on This Device</h4>
              <div id="appsContainer" class="list-container"></div>
            </div>
          </div>
        </section>

        <div id="cardContainer" class="card-container"></div>

        <section class="raw-panel">
          <h3>Raw Output</h3>
          <pre id="outputText">Waiting for action...</pre>
        </section>
      </section>
    </main>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
